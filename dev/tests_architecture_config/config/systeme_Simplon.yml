meta:
  name: "Bateau_Simplon_DE_été_2026"
  version: 1

system:
  mode: Steam           # "DE" ou "Steam"
  timebase:
    dt: 1.0          # s
    t_end: 3600      # s

inputs:
  v_profile: "data/vitesse_bateau_X.csv"     # v(t) en m/s
  hotel_profile: "data/hotel_bateau_X.csv"   # P_HL(t) en W

blocks:
  # Niveau 1 : agrégé au début
  propulsion_path:
    variant: aggregate        # plus tard: detailed
    params:
      method: "table_v_to_Pshaft"   # ou "eta_global"
      table_file: "data/maps/propulsion_v_to_pshaft.csv"
  prime_mover:
    variant: DE               # si mode=Steam -> "Steam"
    params:
      eta_motor: 0.93
      eta_drive: 0.98
      eta_gear: 0.97
  electrical_bus:
    variant: aggregate
    params:
      eta_bus: 0.985
  genset_group:
    variant: aggregate
    params:
      sfc_table: "data/maps/sfc_genset_gperkWh.csv"  # g/kWh vs P
      p_max_total: 800e3
      ramp_kw_per_s: 5e3
  fuel_tank:
    variant: aggregate
    params:
      initial_volume_m3: 25.0
      reserve_fraction: 0.1

fuel_datasheet: "configs/fuels/diesel.yaml"   # lien vers YAML carburant


python run_sim.py --config configs/systems/bateau_A_DE.yaml